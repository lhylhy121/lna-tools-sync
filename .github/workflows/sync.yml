name: Sync Image to Aliyun
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Aliyun
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Pull and Push
        run: |
          # 定义目标地址
          TARGET_IMAGE="${{ secrets.ALIYUN_REGISTRY }}/lna-1/lna-design1:latest"
          
          # 定义备用源镜像列表
          # 1. 官方镜像 2. 社区备份 3. 备用备份
          SOURCES=("efabless/iic-osic-tools:latest" "proppy/iic-osic-tools:latest" "dkisic/iic-osic-tools:latest")
          
          SUCCESS=false
          for SOURCE in "${SOURCES[@]}"; do
            echo "Attempting to pull from $SOURCE..."
            if docker pull $SOURCE; then
              echo "Successfully pulled $SOURCE"
              docker tag $SOURCE $TARGET_IMAGE
              echo "Pushing to Aliyun..."
              docker push $TARGET_IMAGE
              SUCCESS=true
              break
            else
              echo "Failed to pull from $SOURCE, trying next..."
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "All source images failed to pull. Please check Docker Hub status."
            exit 1
          fi
