name: Sync Image to Aliyun
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read # 开启读取 GitHub 库的权限

    steps:
      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean

      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Login to Registries
        run: |
          # 1. 登录 GitHub 官方库 (使用内置 Token)
          echo "${{ secrets.GITHUB_TOKEN }}" | skopeo login --username "${{ github.actor }}" --password-stdin ghcr.io
          
          # 2. 登录阿里云 (使用你的 Secret)
          echo "${{ secrets.ALIYUN_PASSWORD }}" | skopeo login --username "${{ secrets.ALIYUN_USERNAME }}" --password-stdin ${{ secrets.ALIYUN_REGISTRY }}

      - name: Sync Image using Skopeo
        run: |
          # 修正后的官方路径
          SOURCE_IMAGE="docker://ghcr.io/efabless/iic-osic-tools:latest"
          TARGET_IMAGE="docker://${{ secrets.ALIYUN_REGISTRY }}/lna-1/lna-design1:latest"
          
          echo "Starting robust sync..."
          skopeo copy --command-timeout 60m $SOURCE_IMAGE $TARGET_IMAGE
