name: Sync Image to Aliyun
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 512
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Sync Image using Skopeo
        run: |
          # 设定镜像地址
          SOURCE_IMAGE="docker://docker.io/efabless/iic-osic-tools:latest"
          TARGET_IMAGE="docker://${{ secrets.ALIYUN_REGISTRY }}/lna-1/lna-design1:latest"
          
          echo "Starting professional sync from $SOURCE_IMAGE to $TARGET_IMAGE"
          
          # 使用 skopeo 直接搬运，无需 docker pull
          # --src-no-creds 表示源镜像不需要登录
          # --dest-creds 使用你的阿里云账号密码
          skopeo copy --src-no-creds --dest-creds "${{ secrets.ALIYUN_USERNAME }}:${{ secrets.ALIYUN_PASSWORD }}" \
          $SOURCE_IMAGE $TARGET_IMAGE
