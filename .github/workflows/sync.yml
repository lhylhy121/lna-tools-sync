name: Sync Image to Aliyun
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize build space
        # 这个步骤非常关键，因为镜像巨大，需要清理磁盘空间
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 512
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Login to Aliyun
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Pull and Push
        run: |
          # 1. 改用 GitHub 官方镜像库 (GHCR)，这个在 Action 里几乎不会失败
          SOURCE_IMAGE="ghcr.io/iic-osic-tools/iic-osic-tools:latest"
          
          echo "Pulling from GitHub Container Registry..."
          docker pull $SOURCE_IMAGE
          
          # 2. 标记为你自己的阿里云路径
          TARGET_IMAGE="${{ secrets.ALIYUN_REGISTRY }}/lna-1/lna-design1:latest"
          
          echo "Tagging and pushing to Aliyun..."
          docker tag $SOURCE_IMAGE $TARGET_IMAGE
          docker push $TARGET_IMAGE
