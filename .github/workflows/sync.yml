name: Sync Image to Aliyun
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Aliyun
        uses: docker/login-action@v3  # 升级版本解决警告
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Pull and Push
        run: |
          # 1. 拉取原始镜像 (十几GB，GitHub Action 需要跑一段时间)
          docker pull efabless/iic-osic-tools:latest
          
          # 2. 标记镜像 (使用你截图中的完整路径)
          docker tag efabless/iic-osic-tools:latest ${{ secrets.ALIYUN_REGISTRY }}/lna-1/lna-design1:latest
          
          # 3. 推送到阿里云
          docker push ${{ secrets.ALIYUN_REGISTRY }}/lna-1/lna-design1:latest
