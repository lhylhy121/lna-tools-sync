name: Sync Image to Aliyun
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space (Aggressive Clean)
        run: |
          # 必须彻底清理，否则 30GB 的镜像解压会爆磁盘
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean

      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Sync Image using Skopeo
        run: |
          # 核心修正：正确的 GitHub 社区镜像路径
          # 注意：组织名是 iic-osic-tools，镜像名也是 iic-osic-tools
          SOURCE_IMAGE="docker://ghcr.io/iic-osic-tools/iic-osic-tools:latest"
          
          # 你的阿里云目标地址 (请再次确认这个地址正确)
          TARGET_IMAGE="docker://${{ secrets.ALIYUN_REGISTRY }}/lna-1/lna-design1:latest"
          
          echo "Starting sync from GHCR community mirror to Aliyun..."
          
          # 使用 skopeo 强制同步
          # 增加 --command-timeout 确保大文件传输不掉线
          skopeo copy --command-timeout 30m --src-no-creds \
          --dest-creds "${{ secrets.ALIYUN_USERNAME }}:${{ secrets.ALIYUN_PASSWORD }}" \
          $SOURCE_IMAGE $TARGET_IMAGE
