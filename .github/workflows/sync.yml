name: Sync Image to Aliyun
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read # 开启读取 GitHub 库的权限

    steps:
      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean

      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Login to Registries
        run: |
          # 1. 登录 GitHub 官方库 (使用内置 Token)
          echo "${{ secrets.GITHUB_TOKEN }}" | skopeo login --username "${{ github.actor }}" --password-stdin ghcr.io
          
          # 2. 登录阿里云 (使用你的 Secret)
          echo "${{ secrets.ALIYUN_PASSWORD }}" | skopeo login --username "${{ secrets.ALIYUN_USERNAME }}" --password-stdin ${{ secrets.ALIYUN_REGISTRY }}

      - name: Sync Image using Skopeo
        run: |
          # 核心修正：使用官方 JKU 维护的镜像路径
          SOURCE_IMAGE="docker://ghcr.io/iic-jku/iic-osic-tools:latest"
          
          # 你的阿里云目标地址
          TARGET_IMAGE="docker://${{ secrets.ALIYUN_REGISTRY }}/lna-1/lna-design1:latest"
          
          echo "Starting sync from JKU official mirror to Aliyun..."
          
          # 执行同步 (增加 --src-no-creds，因为 JKU 的镜像是完全公开的)
          skopeo copy --src-no-creds --dest-creds "${{ secrets.ALIYUN_USERNAME }}:${{ secrets.ALIYUN_PASSWORD }}" \
          $SOURCE_IMAGE $TARGET_IMAGE
